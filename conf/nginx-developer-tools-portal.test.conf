limit_req_zone $binary_remote_addr zone=developer_tools_portal_test_api:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=developer_tools_portal_test_auth:10m rate=5r/m;

server {
    listen 80;
    server_name test.developer-tools-portal.com;

    location = /api/auth/login {
        limit_req zone=developer_tools_portal_test_auth burst=5 nodelay;

        proxy_pass http://127.0.0.1:19031;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=developer_tools_portal_test_api burst=60 nodelay;

        proxy_pass http://127.0.0.1:19031;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /index.html {
        proxy_pass http://127.0.0.1:18081/index.html;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}
